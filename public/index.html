<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你画我猜 - 联机游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
    </div>

    <!-- 登录界面 -->
    <div id="login-screen" class="screen">
        <div class="card login-card">
            <div class="card-header-icon">🎨</div>
            <h1 class="card-title">你画我猜</h1>
            <p class="card-subtitle">和朋友一起画画猜词</p>
            <div class="login-form">
                <div class="input-group">
                    <input type="text" id="player-name" placeholder="输入你的昵称" maxlength="20" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="text" id="room-id" placeholder="房间号（留空自动生成）" maxlength="10" autocomplete="off">
                </div>
                <button id="join-button" class="btn btn-primary btn-full btn-lg">
                    <span>加入游戏</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 等待界面（房间大厅） -->
    <div id="waiting-screen" class="screen hidden">
        <div class="waiting-layout">
            <!-- 左侧：房间信息 + 配置 -->
            <div class="waiting-left">
                <!-- 房间信息卡片 -->
                <div class="card room-info-card">
                    <div class="room-code-section">
                        <label class="section-label">房间号</label>
                        <div class="room-code-display">
                            <span id="waiting-room-id">------</span>
                            <button id="copy-room-btn" class="btn-icon" title="复制房间号">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="waiting-status">
                        <span id="waiting-player-count">1</span> 名玩家已就位
                        <span id="waiting-hint" class="waiting-hint">等待房主开始游戏...</span>
                    </div>
                </div>

                <!-- 玩家列表卡片 -->
                <div class="card players-card" id="waiting-players-card">
                    <h3 class="card-section-title players-header">
                        <span>👥 玩家列表</span>
                        <button class="players-collapse-btn" id="waiting-players-collapse-btn" title="折叠玩家列表">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                    </h3>
                    <div id="waiting-players-list"></div>
                </div>
            </div>

            <!-- 右侧：配置 + 聊天 -->
            <div class="waiting-right">
                <!-- 房主配置卡片 -->
                <div id="host-config-card" class="card config-card hidden">
                    <h3 class="card-section-title">⚙️ 房间设置</h3>
                    <div class="config-grid">
                        <!-- 词库选择 -->
                        <div class="config-item">
                            <label class="config-label">当前词库</label>
                            <div class="config-control-row">
                                <select id="word-bank-select" class="select-input">
                                    <option value="默认词库">默认词库</option>
                                </select>
                                <button id="btn-apply-wordbank" class="btn btn-sm btn-outline">应用</button>
                            </div>
                        </div>
                        <!-- 导入自定义词库 -->
                        <div class="config-item">
                            <label class="config-label">导入自定义词库</label>
                            <div class="config-control-row">
                                <input type="file" id="wordbank-file-input" accept=".txt" class="file-input-hidden">
                                <button id="btn-import-wordbank" class="btn btn-sm btn-outline">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                        <polyline points="17 8 12 3 7 8"/>
                                        <line x1="12" y1="3" x2="12" y2="15"/>
                                    </svg>
                                    选择 .txt 文件
                                </button>
                            </div>
                            <span id="import-status" class="config-hint"></span>
                        </div>
                        <!-- 轮数设置 -->
                        <div class="config-item">
                            <label class="config-label">总轮数</label>
                            <div class="config-control-row">
                                <input id="waiting-max-rounds" type="number" min="1" max="20" value="3" class="input-number">
                                <button id="btn-apply-rounds" class="btn btn-sm btn-outline">应用</button>
                            </div>
                        </div>
                        <!-- 每轮时间 -->
                        <div class="config-item">
                            <label class="config-label">每轮时间（秒）</label>
                            <div class="config-control-row">
                                <input id="waiting-round-time" type="number" min="10" max="300" value="60" class="input-number">
                                <button id="btn-apply-roundtime" class="btn btn-sm btn-outline">应用</button>
                            </div>
                        </div>
                        <!-- 开始游戏 -->
                        <div class="config-item config-item-full">
                            <button id="btn-start-game" class="btn btn-primary btn-full btn-lg" disabled>
                                🚀 开始游戏（至少需要2名玩家）
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 聊天卡片 -->
                <div class="card chat-card">
                    <div class="chat-card-inner">
                        <h3 class="card-section-title">💬 聊天</h3>
                        <div id="waiting-chat-messages" class="chat-message-area"></div>
                        <div class="chat-input-row">
                            <input type="text" id="waiting-chat-input" placeholder="发送消息..." maxlength="100">
                            <button id="waiting-send-button" class="btn btn-primary btn-sm">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="screen hidden">
        <div class="game-layout">
            <!-- 顶部栏 -->
            <div class="game-topbar">
                <div class="topbar-left">
                    <span class="topbar-room">🏠 <span id="current-room-id"></span></span>
                    <span class="topbar-sep">|</span>
                    <span class="topbar-round">第 <span id="current-round">1</span>/<span id="max-rounds">3</span> 轮</span>
                    <span class="topbar-sep">|</span>
                    <span class="topbar-word" id="current-word-display"></span>
                </div>
                <div class="topbar-right">
                    <span class="topbar-timer" id="time-left">60</span><span>s</span>
                </div>
            </div>

            <!-- 主区域 -->
            <div class="game-main">
                <!-- 画布区域 -->
                <div class="canvas-area">
                    <div class="canvas-toolbar">
                        <!-- 工具按钮组 -->
                        <div class="tool-group tool-buttons">
                            <button class="tool-btn active" data-tool="brush" title="画笔 (B)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
                            </button>
                            <button class="tool-btn" data-tool="eraser" title="橡皮 (E)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14 2.2c.8-.8 2-.8 2.8 0L20 5.5c.8.8.8 2 0 2.8L12.5 15.8"/><line x1="18" y1="15" x2="10" y2="7"/></svg>
                            </button>
                            <button class="tool-btn" data-tool="bucket" title="油漆桶 (G)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 5l-3-3"/><rect x="3" y="8" width="12" height="12" rx="1"/><path d="M3 16l12-8"/></svg>
                            </button>
                            <button class="tool-btn" data-tool="picker" title="吸色 (I)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M6 17l-3 3v3h3l3-3"/><path d="M15.6 7.4l1-1a2.1 2.1 0 114.2 4.2l-1 1"/></svg>
                            </button>
                            <button class="tool-btn" data-tool="pan" title="拖动 (H)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><path d="M2 12h20"/><path d="M12 2v20"/></svg>
                            </button>
                        </div>
                        <span class="tool-sep"></span>
                        <!-- 形状工具 -->
                        <div class="tool-group tool-buttons">
                            <button class="tool-btn" data-tool="rect" title="矩形 (R)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                            </button>
                            <button class="tool-btn" data-tool="circle" title="圆形 (C)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="10"/></svg>
                            </button>
                            <button class="tool-btn" data-tool="line" title="直线 (L)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
                            </button>
                        </div>
                        <span class="tool-sep"></span>
                        <!-- 画笔大小 -->
                        <div class="tool-group">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
                            <input type="range" id="brush-size" min="1" max="30" value="3">
                            <span id="brush-size-display" class="tool-value">3</span>
                        </div>
                        <span class="tool-sep"></span>
                        <!-- 颜色 -->
                        <div class="tool-group color-group">
                            <input type="color" id="color-picker" value="#000000" title="调色盘">
                            <div class="color-dot active" data-color="#000000" style="background:#000000"></div>
                            <div class="color-dot" data-color="#E81123" style="background:#E81123"></div>
                            <div class="color-dot" data-color="#FF8C00" style="background:#FF8C00"></div>
                            <div class="color-dot" data-color="#FFB900" style="background:#FFB900"></div>
                            <div class="color-dot" data-color="#107C10" style="background:#107C10"></div>
                            <div class="color-dot" data-color="#0078D4" style="background:#0078D4"></div>
                            <div class="color-dot" data-color="#5C2D91" style="background:#5C2D91"></div>
                            <div class="color-dot" data-color="#E3008C" style="background:#E3008C"></div>
                            <div class="color-dot" data-color="#FFFFFF" style="background:#FFFFFF"></div>
                        </div>
                        <span class="tool-sep"></span>
                        <button id="clear-canvas" class="btn btn-sm btn-danger">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                            清空
                        </button>
                    </div>
                    <div class="canvas-wrapper">
                        <div class="canvas-viewport" id="canvas-viewport">
                            <canvas id="drawing-canvas" width="2048" height="2048"></canvas>
                        </div>
                        <div class="zoom-controls">
                            <button class="zoom-btn" id="zoom-in" title="放大 (Ctrl+=)">+</button>
                            <input type="range" id="zoom-slider" min="10" max="800" value="100" title="缩放">
                            <span id="zoom-display" class="zoom-label">100%</span>
                            <button class="zoom-btn" id="zoom-out" title="缩小 (Ctrl+-)">−</button>
                            <button class="zoom-btn zoom-reset-btn" id="zoom-reset" title="重置 (Ctrl+0)">1:1</button>
                        </div>
                    </div>
                </div>

                <!-- 右侧面板 -->
                <div class="game-sidebar">
                    <!-- 玩家列表 -->
                    <div class="card sidebar-card sidebar-players" id="game-players-card">
                        <h3 class="card-section-title players-header">
                            <span>👥 玩家 <span id="player-count">0</span></span>
                            <button class="players-collapse-btn" id="game-players-collapse-btn" title="折叠玩家列表">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                        </h3>
                        <div id="players-list"></div>
                    </div>

                    <!-- 聊天 -->
                    <div class="card sidebar-card sidebar-chat" id="game-chat-card">
                        <div class="chat-card-inner">
                            <h3 class="card-section-title chat-header">
                                <span>💬 聊天 / 猜词</span>
                                <button class="chat-collapse-btn" id="chat-collapse-btn" title="折叠聊天">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                </button>
                            </h3>
                            <div id="chat-messages" class="chat-message-area"></div>
                            <div class="chat-input-row">
                                <input type="text" id="chat-input" placeholder="输入你的猜测..." maxlength="50">
                                <button id="send-button" class="btn btn-primary btn-sm">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="22" y1="2" x2="11" y2="13"/>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="end-screen" class="screen hidden">
        <div class="card end-card">
            <div class="card-header-icon">🎉</div>
            <h1 class="card-title">游戏结束</h1>
            <div id="final-scores"></div>
            <button id="new-game-button" class="btn btn-primary btn-full btn-lg">
                返回房间
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
